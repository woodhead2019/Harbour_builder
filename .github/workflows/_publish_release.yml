name: Publish release for harbour/core SHA

on:
  workflow_run:
    workflows:
      - Harbour for Windows 32 using BCC
      - Harbour for Apple Darwin
      - Harbour for Apple Darwin ARM64
      - Harbour for Apple Darwin x86_64
      - Harbour for Windows 32 using MinGW
      - Harbour for Windows 64 using MinGW
      - Harbour for Windows 32 using MSVC
      - Harbour for Windows 64 using MSVC
      - Harbour for Windows ARM64 using MSVC
      - Harbour for Ubuntu 64-bits
      - Harbour for Ubuntu ARM64
      - Harbour for Win64 and ADS using msvc
      - Harbour for Win64 using msvc
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read tracked harbour/core SHA
        id: sha
        run: |
          if [ ! -s .github/last_core_sha.txt ]; then
            echo "No SHA tracked yet — nothing to release."
            echo "have=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          full=$(tr -d '[:space:]' < .github/last_core_sha.txt)
          short=${full:0:7}
          tag="core-$short"
          echo "have=true" >> "$GITHUB_OUTPUT"
          echo "full=$full" >> "$GITHUB_OUTPUT"
          echo "short=$short" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Target tag: $tag (harbour/core@$full)"

      - name: Skip if release already exists
        id: exists
        if: steps.sha.outputs.have == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.sha.outputs.tag }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release already exists; nothing to do"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve latest successful run per workflow
        id: runs
        if: steps.sha.outputs.have == 'true' && steps.exists.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          workflows=(
            harbour_bcc_32.yml
            harbour_darwin_osx.yml
            harbour_darwin_arm.yml
            harbour_darwin_osx_x86.yml
            harbour_mingw_32.yml
            harbour_mingw_64.yml
            harbour_msvc_32.yml
            harbour_msvc_64.yml
            harbour_ubuntu_64.yml
            harbour_ubuntu_arm64.yml
            harbour_win64_ADS_msvc.yml
            harbour_win64_msvc.yml
            harbour_win_arm_msvc.yml
          )
          missing=0
          : > runs.txt
          for wf in "${workflows[@]}"; do
            run_id=$(gh api \
              "repos/$GITHUB_REPOSITORY/actions/workflows/$wf/runs?branch=master&status=success&per_page=1" \
              --jq '.workflow_runs[0].id // empty')
            if [ -z "$run_id" ]; then
              echo "  $wf: no successful run yet"
              missing=$((missing + 1))
            else
              echo "  $wf: run $run_id"
              echo "$wf:$run_id" >> runs.txt
            fi
          done
          if [ $missing -gt 0 ]; then
            echo "$missing workflows have no successful run; release postponed."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts from each run
        if: steps.runs.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p release-staging
          while IFS=: read -r wf run_id; do
            target="release-staging/$wf"
            mkdir -p "$target"
            echo "Downloading artifacts for $wf (run $run_id)"
            gh run download "$run_id" --repo "$GITHUB_REPOSITORY" --dir "$target"
          done < runs.txt
          find release-staging -maxdepth 3 -type d | sort

      - name: Bundle each build into a release zip
        if: steps.runs.outputs.ready == 'true'
        env:
          CORE_SHORT: ${{ steps.sha.outputs.short }}
        run: |
          set -e
          mkdir -p assets
          # Each subdir under release-staging/<wf>/ is one artifact (one platform).
          for wf_dir in release-staging/*/; do
            for art_dir in "$wf_dir"*/; do
              art_name=$(basename "$art_dir")
              # Append harbour/core short SHA to the zip name for traceability.
              zip_name="${art_name}_core-${CORE_SHORT}.zip"
              echo "Zipping $art_dir -> assets/$zip_name"
              (cd "$art_dir" && zip -qr "$GITHUB_WORKSPACE/assets/$zip_name" .)
            done
          done
          ls -lh assets/
          echo "Total assets: $(ls assets/ | wc -l)"

      - name: Create release with all assets
        if: steps.runs.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.sha.outputs.tag }}"
          short="${{ steps.sha.outputs.short }}"
          full="${{ steps.sha.outputs.full }}"
          date=$(date -u +%Y-%m-%d)
          notes=$(cat <<EOF
          Automatic build of [harbour/core@${short}](https://github.com/harbour/core/commit/${full})
          for every supported flavour.

          - Date (UTC): ${date}
          - Upstream commit: \`${full}\`
          - Built by: [\`_watch_harbour_core.yml\`](https://github.com/${GITHUB_REPOSITORY}/blob/master/.github/workflows/_watch_harbour_core.yml)

          Each asset is a self-contained tree (\`bin/\`, \`lib/\`, \`include/\`, \`contrib/\`)
          installed with \`HB_INSTALL_PREFIX\`. Pick the one that matches your
          toolchain.
          EOF
          )
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Harbour built from core@${short}" \
            --notes "$notes" \
            assets/*.zip
          echo "Released $tag with $(ls assets/*.zip | wc -l) assets."
