name: Harbour for iOS

# Experimental: Harbour core is cross-compiled with the iOS SDK.
# Phase 1 builds the host tools (compiler/hbmk2), phase 2 rebuilds the
# C libraries against the iOS sysroot. Only static libs are produced.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: ios_arm64,        sdk: iphoneos,        arch: arm64,  minflag: "-miphoneos-version-min=13.0" }
          - { name: iossimulator_arm64,sdk: iphonesimulator, arch: arm64,  minflag: "-mios-simulator-version-min=13.0" }
          - { name: iossimulator_x64, sdk: iphonesimulator,  arch: x86_64, minflag: "-mios-simulator-version-min=13.0" }

    steps:
    - name: Checkout harbour/core repo
      uses: actions/checkout@v4
      with:
       repository: harbour/core
       path: harbour

    - name: Build host Harbour (compiler + hbmk2)
      run: |
        cd harbour
        make HB_BUILD_CONTRIBS="" HB_INSTALL_PREFIX="$GITHUB_WORKSPACE/host" install

    - name: Cross-compile Harbour for iOS (${{ matrix.name }})
      run: |
        cd harbour
        SYSROOT="$(xcrun --sdk ${{ matrix.sdk }} --show-sdk-path)"
        echo "SDK sysroot: $SYSROOT"
        make clean || true
        export HB_PLATFORM=darwin
        export HB_COMPILER=clang
        export HB_CPU=${{ matrix.arch }}
        export HB_HOST_BIN="$GITHUB_WORKSPACE/host/bin"
        export HB_USER_CFLAGS="-arch ${{ matrix.arch }} -isysroot $SYSROOT ${{ matrix.minflag }}"
        export HB_USER_LDFLAGS="-arch ${{ matrix.arch }} -isysroot $SYSROOT ${{ matrix.minflag }}"
        export HB_BUILD_CONTRIBS=""
        export HB_BUILD_DYN=no
        export HB_INSTALL_PREFIX="$GITHUB_WORKSPACE/output"
        make
        make install

    - name: Get current time
      id: current-time
      run: echo "formattedTime=$(date +%Y_%m_%d)" >> "$GITHUB_OUTPUT"

    - name: Upload Harbour to artifact
      env:
         TIME: "${{ steps.current-time.outputs.formattedTime }}"
      uses: actions/upload-artifact@v4
      with:
       name: harbour_${{ matrix.name }}_${{ env.TIME }}
       path: output
