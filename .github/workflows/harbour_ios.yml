name: Harbour for iOS

# Experimental: Harbour core is cross-compiled with the iOS SDK.
# Phase 1 builds the host tools (compiler/hbmk2). Phase 2 patches a few
# core sources that call APIs the iOS SDK marks unavailable (system(),
# ...) and rebuilds the C libraries against the iOS sysroot.
# Only static libs are produced (process-spawning RTL funcs become no-ops).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: ios_arm64,        sdk: iphoneos,        arch: arm64,  minflag: "-miphoneos-version-min=13.0" }
          - { name: iossimulator_arm64,sdk: iphonesimulator, arch: arm64,  minflag: "-mios-simulator-version-min=13.0" }
          - { name: iossimulator_x64, sdk: iphonesimulator,  arch: x86_64, minflag: "-mios-simulator-version-min=13.0" }

    steps:
    - name: Checkout harbour/core repo
      uses: actions/checkout@v4
      with:
       repository: harbour/core
       path: harbour

    - name: Build host Harbour (compiler + hbmk2)
      run: |
        cd harbour
        make HB_BUILD_CONTRIBS=no HB_INSTALL_PREFIX="$GITHUB_WORKSPACE/host" install

    - name: Patch core sources for iOS (neutralise SDK-forbidden calls)
      run: |
        cd harbour
        # system() is __API_UNAVAILABLE(ios). Redirect the few call sites to a
        # local stub that returns -1 (running external commands is meaningless
        # in the iOS sandbox anyway). The stub is prepended to each file; the
        # \b before "system" means it never matches "hb_ios_no_system(".
        for f in src/common/hbfopen.c src/rtl/run.c src/rtl/hbrunfun.c; do
          perl -0pi -e 's/\A/static int hb_ios_no_system( const char * c ) { ( void ) c; return -1; }\n/' "$f"
          perl -pi  -e 's/\bsystem\s*\(/hb_ios_no_system(/g' "$f"
          echo "patched $f"
        done

    - name: Cross-compile Harbour for iOS (${{ matrix.name }})
      run: |
        cd harbour
        SYSROOT="$(xcrun --sdk ${{ matrix.sdk }} --show-sdk-path)"
        echo "SDK sysroot: $SYSROOT"
        make clean || true
        export HB_PLATFORM=darwin
        export HB_COMPILER=clang
        export HB_CPU=${{ matrix.arch }}
        export HB_HOST_BIN="$GITHUB_WORKSPACE/host/bin"
        export HB_USER_CFLAGS="-arch ${{ matrix.arch }} -isysroot $SYSROOT ${{ matrix.minflag }}"
        export HB_USER_LDFLAGS="-arch ${{ matrix.arch }} -isysroot $SYSROOT ${{ matrix.minflag }}"
        export HB_BUILD_CONTRIBS=no
        export HB_BUILD_DYN=no
        export HB_INSTALL_PREFIX="$GITHUB_WORKSPACE/output"
        make
        make install

    - name: Get current time
      id: current-time
      run: echo "formattedTime=$(date +%Y_%m_%d)" >> "$GITHUB_OUTPUT"

    - name: Upload Harbour to artifact
      env:
         TIME: "${{ steps.current-time.outputs.formattedTime }}"
      uses: actions/upload-artifact@v4
      with:
       name: harbour_${{ matrix.name }}_${{ env.TIME }}
       path: output
